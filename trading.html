<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFS Terminal | Live Trading</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
    --primary-teal: #00BFA5;
    --bg-dark: #121417;
    --card-bg: #1e222d;
    --text-light: #d1d4dc;
    --up-color: #00c076;
    --down-color: #ff3a68;
    --border-color: #2a2e39;
    --nav-h: 65px;
}

/* --- BASE RESET --- */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden; /* Important: Prevents the whole page from bouncing */
}

/* --- ADJUSTABLE TOP BAR --- */
.terminal-nav {
    height: var(--nav-h);
    background: var(--card-bg);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    gap: 10px;
}

.nav-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.search-area { display: flex; align-items: center; gap: 5px; flex: 2; justify-content: center; }
.nav-right { flex: 1; display: flex; justify-content: flex-end; }

.ticker-info { display: flex; flex-direction: column; overflow: hidden; }
#tickerDisplay { font-weight: 800; font-size: 0.85rem; color: #fff; white-space: nowrap; }
#livePriceDisplay { font-weight: 700; font-size: 0.8rem; color: var(--up-color); }

.search-area input {
    background: var(--bg-dark);
    border: 1px solid var(--border-color);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    width: 100%;
    max-width: 140px;
    font-size: 0.8rem;
}

.logo-text { font-weight: 900; color: var(--primary-teal); font-size: 0.9rem; }

/* --- DYNAMIC LAYOUT ENGINE --- */
.terminal-body {
    display: grid;
    grid-template-columns: 1fr 360px; /* Desktop */
    height: calc(100vh - var(--nav-h));
    width: 100%;
}

#chart-container {
    width: 100%;
    height: 100%;
    background: #1e222d;
    min-height: 250px;
}

.sidebar {
    background: var(--card-bg);
    border-left: 1px solid var(--border-color);
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto; /* Sidebar scrolls independently */
}

/* --- UI ELEMENTS --- */
.balance-box { background: #2a2e39; padding: 12px; border-radius: 10px; border-left: 4px solid var(--primary-teal); }
.tab-row { display: flex; background: #121417; border-radius: 8px; padding: 3px; }
.tab-btn { flex: 1; border: none; background: none; color: #848e9c; padding: 10px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.75rem; }
.tab-btn.active.buy { background: var(--up-color); color: #fff; }
.tab-btn.active.sell { background: var(--down-color); color: #fff; }

.exec-btn { padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1rem; width: 100%; }
.btn-buy { background: var(--up-color); color: #fff; }
.btn-sell { background: var(--down-color); color: #fff; }

.holdings-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
.holdings-table th { color: #848e9c; text-align: left; padding-bottom: 5px; border-bottom: 1px solid var(--border-color); }
.holdings-table td { padding: 8px 0; border-bottom: 1px solid #2a2e39; }

/* --- THE MOBILE FIX --- */
@media (max-width: 850px) {
    .terminal-nav {
        flex-wrap: wrap;
        height: auto;
        padding: 10px;
    }

    .nav-left { flex: 1; }
    .nav-right { flex: 0; }
    .search-area {
        width: 100%;
        order: 3;
        margin-top: 8px;
        flex: none;
        justify-content: flex-start;
    }
    .search-area input { max-width: none; flex: 1; }

    .terminal-body {
        grid-template-columns: 1fr; /* Stacked */
        grid-template-rows: 40vh 1fr; /* Chart top 40%, Sidebar takes rest */
        height: calc(100vh - 100px); /* Adjust for taller mobile nav */
    }

    #chart-container {
        border-bottom: 1px solid var(--border-color);
    }

    .sidebar {
        border-left: none;
        height: 100%; /* Fills the second grid row */
        padding-bottom: 100px; /* Space for mobile browser bars */
    }
}
    </style>
</head>
<body>

<nav class="terminal-nav">
    <div class="nav-left">
        <a href="dashboard.html" style="text-decoration:none; color:#848e9c; font-size: 0.7rem;">← Back</a>
        <div class="ticker-info">
            <span id="tickerDisplay">RELIANCE</span>
            <span id="livePriceDisplay">₹0.00</span>
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="symbolInput" placeholder="Symbol">
        <button onclick="changeSymbol()" style="background:var(--primary-teal); border:none; color:white; padding:0 12px; border-radius:6px; cursor:pointer; font-weight:bold; height: 35px; font-size: 0.75rem;">Search</button>
        <a href="logs.html" style="background:#3a3f50; color:white; text-decoration:none; padding:8px 12px; border-radius:6px; font-size:0.75rem; display: flex; align-items: center;">📜 Logs</a>
    </div>

    <div class="nav-right">
        <span class="logo-text">💠 OFS</span>
    </div>
</nav>

<div class="terminal-body">
    <div id="chart-container"></div>
    <aside class="sidebar">
        <div class="balance-box">
            <div style="font-size: 0.7rem; color:#848e9c; text-transform: uppercase;">Available Cash</div>
            <div id="portfolioCash" style="font-size: 1.4rem; font-weight: 900; color: white;">₹0.00</div>
        </div>

        <div class="transfer-section">
            <div style="font-size: 0.65rem; color:#f39c12; font-weight: 800; margin-bottom: 5px; text-transform: uppercase;">Bank Transfer</div>
            <input type="number" id="transferAmount" placeholder="₹ Amount" style="padding: 10px; height: 38px; margin-bottom: 8px; background: #121417; border: 1px solid var(--border-color); color: white; border-radius: 8px; width: 100%;">
            <div style="display: flex; gap: 5px;">
                <button onclick="transferFunds('add')" style="flex: 1; background: var(--up-color); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem;">ADD</button>
                <button onclick="transferFunds('withdraw')" style="flex: 1; background: var(--down-color); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem;">WITHDRAW</button>
            </div>
        </div>

        <div class="tab-row">
            <button class="tab-btn active buy" id="buyTab" onclick="setMode('BUY')">BUY</button>
            <button class="tab-btn" id="sellTab" onclick="setMode('SELL')">SELL</button>
        </div>

        <div>
            <label style="font-size:0.7rem; color:#848e9c; font-weight: 700;">QUANTITY</label>
            <input type="number" id="tradeQty" value="1" min="1" oninput="updateTotal()" style="margin-top: 5px; width: 100%; background: #121417; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 8px;">
        </div>

        <div style="background:#121417; padding:15px; border-radius:12px; display:flex; justify-content:space-between; font-size: 0.85rem; border: 1px solid var(--border-color);">
            <span style="color:#848e9c;">Order Value</span>
            <span id="estTotal" style="font-weight:bold; color:white;">₹0.00</span>
        </div>

        <button class="exec-btn btn-buy" id="mainBtn" onclick="executeTrade()">PLACE BUY ORDER</button>

        <div class="holdings-container">
            <div style="font-weight: 900; font-size: 0.7rem; margin-bottom: 10px; color: #848e9c; text-transform: uppercase;">Current Holdings</div>
            <table class="holdings-table">
                <thead>
                <tr><th>STOCK</th><th>QTY</th><th>P&L</th><th></th></tr>
                </thead>
                <tbody id="holdingsList">
                </tbody>
            </table>
        </div>
    </aside>
</div>

<script>
    // Keeping your JS exactly as requested
    const API_URL = 'https://ofs-backend-31ja.onrender.com/api/trade';
    const userId = localStorage.getItem("userId") || 1;

    let chart, candleSeries, lastCandle;
    let currentPrice = 0, currentSymbol = 'RELIANCE', currentMode = 'BUY', liveInterval;
    let userHoldings = [];

    window.addEventListener('load', async () => {
        initChart();
        loadInitialData();

        const logsBtn = document.querySelector('.logs-btn');
        if (logsBtn) { logsBtn.href = `logs.html?id=${userId}`; }

        await refreshAll();
    });

    async function apiCall(endpoint, method = 'GET', params = {}) {
        const url = new URL(`${API_URL}${endpoint}`);
        let options = {
            method: method,
            headers: { 'Accept': 'application/json, text/plain, */*' }
        };
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        try {
            const response = await fetch(url, options);
            const text = await response.text();
            if (!response.ok) throw new Error(text || 'Server Error');
            try { return JSON.parse(text); } catch (e) { return text; }
        } catch (err) {
            console.error(`Fetch error on ${endpoint}:`, err);
            return null;
        }
    }

    async function refreshAll() {
        await loadPortfolio();
        await loadHoldings();
    }

    async function loadPortfolio() {
        const data = await apiCall('/portfolio-details', 'GET', { userId: userId });
        if (data && typeof data === 'object' && data.cashBalance !== undefined) {
            document.getElementById('portfolioCash').innerText = `₹${data.cashBalance.toLocaleString('en-IN', {minimumFractionDigits:2})}`;
        }
    }

    async function loadHoldings() {
        const data = await apiCall('/holdings', 'GET', { userId: userId });
        if (data && Array.isArray(data)) {
            userHoldings = data;
            renderHoldings();
        }
    }

    async function transferFunds(type) {
        const amountInput = document.getElementById('transferAmount');
        const amount = amountInput.value;
        if (!amount || amount <= 0) return alert("Please enter a valid amount.");
        const endpoint = type === 'add' ? '/transfer-funds' : '/withdraw-funds';
        const res = await apiCall(endpoint, 'POST', { userId: userId, amount: amount });
        if (res) {
            alert("✅ " + res);
            amountInput.value = '';
            await refreshAll();
        } else alert("❌ Transfer failed.");
    }

    async function executeTrade() {
        const qty = document.getElementById('tradeQty').value;
        if (!qty || qty <= 0) return alert("Please enter quantity.");
        const res = await apiCall('/execute', 'POST', {
            userId: userId, symbol: currentSymbol, type: currentMode, qty: qty, price: currentPrice
        });
        if (res) {
            alert("✅ " + res);
            await refreshAll();
        } else alert("❌ Trade failed.");
    }

    function renderHoldings() {
        const container = document.getElementById('holdingsList');
        if (userHoldings.length === 0) {
            container.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:#848e9c;">No active holdings</td></tr>';
            return;
        }
        container.innerHTML = userHoldings.map(h => {
            const isCurrentTicker = h.symbol === currentSymbol;
            const marketPrice = isCurrentTicker ? currentPrice : (h.avgPrice || 0);
            const buyPrice = h.avgPrice || marketPrice;
            const pnlValue = (marketPrice - buyPrice) * h.quantity;
            const pnlClass = pnlValue >= 0 ? 'pnl-green' : 'pnl-red';
            const sign = pnlValue >= 0 ? '+' : '';
            return `
                <tr>
                    <td style="font-weight:bold;">${h.symbol}</td>
                    <td>${h.quantity}</td>
                    <td style="color:${pnlValue >= 0 ? 'var(--up-color)' : 'var(--down-color)'}; font-weight:bold;">${sign}${pnlValue.toFixed(2)}</td>
                    <td><button class="exit-btn" style="color: #848e9c; cursor: pointer; border: 1px solid #2a2e39; background: none; padding: 2px 5px; border-radius: 4px; font-size: 0.65rem;" onclick="quickSell('${h.symbol}', ${h.quantity})">✕</button></td>
                </tr>
            `;
        }).join('');
    }

    function initChart() {
        const container = document.getElementById('chart-container');
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth, height: container.clientHeight,
            layout: { background: { color: '#1e222d' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#00c076', downColor: '#ff3a68', borderVisible: false });
        window.addEventListener('resize', () => chart.applyOptions({ width: container.clientWidth, height: container.clientHeight }));
    }

    function loadInitialData() {
        const history = generateHistory();
        candleSeries.setData(history);
        lastCandle = { ...history[history.length - 1] };
        currentPrice = lastCandle.close;
        document.getElementById('livePriceDisplay').innerText = `₹${currentPrice.toLocaleString()}`;
        updateTotal();
        chart.timeScale().fitContent();
        startLiveUpdates();
    }

    function startLiveUpdates() {
        if (liveInterval) clearInterval(liveInterval);
        liveInterval = setInterval(() => {
            const change = (Math.random() - 0.5) * (currentPrice * 0.0008);
            currentPrice = parseFloat((currentPrice + change).toFixed(2));
            document.getElementById('livePriceDisplay').innerText = `₹${currentPrice.toLocaleString()}`;
            lastCandle.close = currentPrice;
            candleSeries.update(lastCandle);
            updateTotal();
            renderHoldings();
        }, 1000);
    }

    function generateHistory() {
        const data = []; let t = new Date(); t.setDate(t.getDate() - 50);
        let val = 1500;
        for (let i = 0; i < 50; i++) {
            const o = val; const c = val + (Math.random() * 20 - 10);
            data.push({ time: t.toISOString().split('T')[0], open: o, high: Math.max(o,c)+5, low: Math.min(o,c)-5, close: c });
            t.setDate(t.getDate() + 1); val = c;
        }
        return data;
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('buyTab').className = `tab-btn ${mode === 'BUY' ? 'active buy' : ''}`;
        document.getElementById('sellTab').className = `tab-btn ${mode === 'SELL' ? 'active sell' : ''}`;
        const btn = document.getElementById('mainBtn');
        btn.className = `exec-btn ${mode === 'BUY' ? 'btn-buy' : 'btn-sell'}`;
        btn.innerText = `PLACE ${mode} ORDER`;
    }

    function updateTotal() {
        const qty = document.getElementById('tradeQty').value || 1;
        document.getElementById('estTotal').innerText = `₹${(qty * currentPrice).toLocaleString()}`;
    }

    function changeSymbol() {
        const input = document.getElementById('symbolInput').value.toUpperCase();
        if(input) {
            currentSymbol = input;
            document.getElementById('tickerDisplay').innerText = input;
            currentPrice = Math.random() * 1500 + 100;
            loadInitialData();
            refreshAll();
        }
    }

    function quickSell(symbol, qty) {
        setMode('SELL');
        currentSymbol = symbol;
        document.getElementById('tickerDisplay').innerText = symbol;
        document.getElementById('tradeQty').value = qty;
        updateTotal();
    }
</script>
</body>
</html>
